name: insightflow
description: Autonomous Content-to-Action Agent powered by Gemini AI
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  flutter_dotenv: ^5.1.0
  shared_preferences: ^2.2.2
  file_picker: ^6.1.1
  flutter_markdown: ^0.6.22
  lottie: ^3.1.0
  intl: ^0.19.0
  url_launcher: ^6.2.5
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  timeline_tile: ^2.0.0
  percent_indicator: ^4.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/
